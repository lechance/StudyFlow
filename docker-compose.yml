# StudyFlow - Docker Compose
services:
  app:
    build: .
    ports:
      - "5000:5000"
    environment:
      - NODE_ENV=production
      - PORT=5000
      - NEXT_TELEMETRY_DISABLED=1
    volumes:
      - studyflow_data:/app/data
    restart: unless-stopped
    command: pnpm next start -p 5000 -H 0.0.0.0

volumes:
  studyflow_data:

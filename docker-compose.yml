# StudyFlow - Production Docker Compose Configuration
# Simple deployment with single Dockerfile

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile.prod
    container_name: studyflow-app
    ports:
      - "5000:5000"
    environment:
      - NODE_ENV=production
      - PORT=5000
    volumes:
      # Persist SQLite database in named volume
      - studyflow_data:/app/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:5000"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

# Named volumes for data persistence
volumes:
  studyflow_data:
    driver: local

# StudyFlow - Docker Compose
# Production deployment configuration

version: "3.8"

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        - NODE_ENV=production
    image: studyflow/app:latest
    container_name: studyflow-app
    ports:
      - "5000:5000"
    environment:
      - NODE_ENV=production
      - PORT=5000
      - NEXT_TELEMETRY_DISABLED=1
      - HOSTNAME=0.0.0.0
    volumes:
      - studyflow_data:/app/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:5000"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    command: >
      sh -c "
        chmod -R 777 /app/data &&
        pnpm next start -p 5000 -H 0.0.0.0
      "

volumes:
  studyflow_data:
    driver: local

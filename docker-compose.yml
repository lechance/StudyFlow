# StudyFlow - Docker Compose
services:
  app:
    build: .
    container_name: studyflow-app
    ports:
      - "5000:5000"
    environment:
      - NODE_ENV=production
      - PORT=5000
    volumes:
      - studyflow_data:/app/data
    restart: unless-stopped
    # Run as root to ensure write access to mounted volumes
    user: root
    command: pnpm next start -p 5000

volumes:
  studyflow_data:

# StudyFlow - Production Docker Compose Configuration
version: '3.8'

services:
  app:
    build:
      context: .
      # Use Dockerfile.prod for Alpine-based image (smaller size)
      # Use Dockerfile.prod.slim for Node.js slim image (better compatibility)
      dockerfile: ${DOCKERFILE:-Dockerfile.prod}
      # Use cache for faster builds
      cache_from:
        - studyflow:latest
    container_name: studyflow-app
    ports:
      - "${DEPLOY_RUN_PORT:-5000}:5000"
    environment:
      - NODE_ENV=production
      - PORT=5000
      - COZE_PROJECT_ENV=${COZE_PROJECT_ENV:-PROD}
      - COZE_PROJECT_DOMAIN_DEFAULT=${COZE_PROJECT_DOMAIN_DEFAULT:-}
    volumes:
      # Persist SQLite database in named volume
      - studyflow_data:/app/data
      # Optional: Mount custom public assets
      # - ./custom_public:/app/public:ro
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

# Named volumes for data persistence
volumes:
  studyflow_data:
    driver: local

# Network configuration
networks:
  default:
    name: studyflow-network
    driver: bridge

# Usage:
# 1. Default (Alpine): docker-compose up -d
# 2. Slim image: DOCKERFILE=Dockerfile.prod.slim docker-compose up -d --build
# 3. View logs: docker-compose logs -f
# 4. Stop: docker-compose down
# 5. Full rebuild: docker-compose up -d --build
# 6. With custom port: DEPLOY_RUN_PORT=8080 docker-compose up -d

# StudyFlow - Docker Compose
version: "3.8"

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: studyflow-app
    ports:
      - "5000:5000"
    environment:
      - NODE_ENV=production
      - PORT=5000
      - NEXT_TELEMETRY_DISABLED=1
    volumes:
      - studyflow_data:/app/data
    restart: unless-stopped
    user: root
    command: >
      sh -c "
        chmod -R 777 /app/data &&
        pnpm next start -p 5000 -H 0.0.0.0
      "

volumes:
  studyflow_data:
    driver: local

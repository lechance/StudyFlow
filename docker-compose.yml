# StudyFlow - Production Docker Compose Configuration
version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile.prod
      # Use cache for faster builds
      cache_from:
        - studyflow:latest
    container_name: studyflow-app
    ports:
      - "${DEPLOY_RUN_PORT:-5000}:5000"
    environment:
      - NODE_ENV=production
      - PORT=5000
      - COZE_PROJECT_ENV=${COZE_PROJECT_ENV:-PROD}
      - COZE_PROJECT_DOMAIN_DEFAULT=${COZE_PROJECT_DOMAIN_DEFAULT:-}
    volumes:
      # Persist SQLite database in named volume
      - studyflow_data:/app/data
      # Optional: Mount custom public assets
      # - ./custom_public:/app/public:ro
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    # Resource limits (optional, uncomment to enable)
    # deploy:
    #   resources:
    #     limits:
    #       cpus: '0.5'
    #       memory: 512M
    #     reservations:
    #       cpus: '0.25'
    #       memory: 256M
    # Logging configuration
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

# Named volumes for data persistence
volumes:
  studyflow_data:
    driver: local

# Network configuration
networks:
  default:
    name: studyflow-network
    driver: bridge

# Usage:
# 1. Development: docker-compose up -d
# 2. View logs: docker-compose logs -f
# 3. Stop: docker-compose down
# 4. Full rebuild: docker-compose up -d --build
# 5. With custom port: DEPLOY_RUN_PORT=8080 docker-compose up -d
